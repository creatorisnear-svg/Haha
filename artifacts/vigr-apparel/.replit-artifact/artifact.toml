kind = "web"
previewPath = "/"
title = "VIGR Angel Apparel"
version = "1.0.0"
id = "artifacts/vigr-apparel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18155

[services.development]
run = "pnpm --filter @workspace/vigr-apparel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vigr-apparel", "run", "build" ]
publicDir = "artifacts/vigr-apparel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18155"
BASE_PATH = "/"
